<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PTITBank Digital - LoA4 Security</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --mb-blue-dark: #001a5e;
            --mb-blue-bright: #003399;
            --mb-blue-electric: #00d2ff;
            --mb-white: #ffffff;
            --mb-bg: #f2f5fa;
        }
        body {
            background-color: var(--mb-bg);
            font-family: 'Roboto', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            min-height: 100vh;
        }
        .app-container {
            width: 100%;
            max-width: 430px;
            height: 932px; /* Chuẩn iPhone 15 Pro Max */
            margin: auto;
            background: linear-gradient(180deg, var(--mb-blue-dark) 0%, var(--mb-blue-bright) 100%);
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            box-shadow: 0 0 50px rgba(0,0,0,0.3);
        }
        /* Custom Scrollbar cho đẹp */
        .app-container::-webkit-scrollbar { width: 0px; }
        
        .btn-mb-primary {
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 12px;
            padding: 14px;
        }
        .form-control-mb {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            text-align: center;
        }
        .form-control-mb::placeholder { color: rgba(255,255,255,0.5); }
        .form-control-mb:focus { background: rgba(255, 255, 255, 0.2); box-shadow: none; border-color: #00d2ff; color: white; }
    </style>
</head>
<body>
    <div class="app-container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
